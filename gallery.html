<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Clinic Gallery | Ayuraksha Acupuncture and Naturopathy Clinic</title>

  <meta
    name="description"
    content="Explore the Ayuraksha Acupuncture and Naturopathy Clinic gallery featuring treatment sessions, healing therapies, patient care, wellness activities, and clinic environment."
  />
<link rel="canonical" href="https://www.ayurakshawellness.com/gallery.html" />
  <meta
    name="keywords"
    content="Ayuraksha gallery, acupuncture clinic photos, naturopathy clinic, wellness center, treatment sessions, acupuncture therapy"
  />

  <meta name="robots" content="index, follow" />
  <meta name="author" content="Ayuraksha Wellness Clinic" />

  <!-- Open Graph (Social Sharing SEO) -->
  <meta property="og:title" content="Clinic Gallery | Ayuraksha Wellness Clinic" />
  <meta
    property="og:description"
    content="Explore Ayuraksha Clinic gallery featuring healing therapies, patient care, and wellness activities."
  />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="./Images/Appreciation.jpeg" />

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- MAIN CONTENT -->
  <main>

    <!-- GALLERY SECTION -->
    <section class="gallery" id="gallery" aria-labelledby="gallery-title">

      <div class="section-title">
        <h1 id="gallery-title">Clinic Gallery</h1>
        <p>Healing moments, patient care & wellness activities</p>
      </div>

      <div class="masonry-gallery">

        <div class="gallery-item">
          <img
            src="./Images/Appreciation.jpeg"
            alt="Patient appreciation at Ayuraksha Clinic"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

        <div class="gallery-item">
          <img
            src="./Images/Appreciation3.jpeg"
            alt="Acupuncture therapy session"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

        <div class="gallery-item">
          <img
            src="./Images/convocation.jpeg"
            alt="Medical convocation and recognition event"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

        <div class="gallery-item">
          <img
            src="./Images/Appreciation2.jpeg"
            alt="Patient wellness consultation"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

        <div class="gallery-item">
          <img
            src="./Images/Consultation2.jpeg"
            alt="Natural healing treatment session"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

        <div class="gallery-item">
          <img
            src="./Images/Consultation3.jpeg"
            alt="Ayuraksha clinic patient care"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

        <div class="gallery-item">
          <img
            src="./Images/Consultation.jpeg"
            alt="Consultation at Ayuraksha Acupuncture Clinic"
            loading="lazy"
            width="500"
            height="600"
          />
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- Main JS -->
  <script src="script.js"></script>

</body>
</html>
